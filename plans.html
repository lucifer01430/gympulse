<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans - Armour Fitness Club</title>
    <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AFC" />
    <link rel="manifest" href="assets/favicon/site.webmanifest" />
    <script>
        (function () {
            try {
                const raw = localStorage.getItem("gympulse_db");
                const parsed = raw ? JSON.parse(raw) : null;
                const theme = parsed && parsed.settings && parsed.settings.theme ? parsed.settings.theme : "dark";
                document.documentElement.setAttribute("data-theme", theme);
                document.documentElement.setAttribute("data-bs-theme", theme);
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "dark");
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="plans" data-title="Plans" data-requires-auth="true" class="app-body">
    <div id="page-root">
        <section class="row g-4 mb-4" id="planSummary"></section>
        <section class="row g-4">
            <div class="col-xl-5">
                <div class="panel-card h-100">
                    <div class="panel-head">
                        <div>
                            <h1 id="planFormTitle">Create Membership Plan</h1>
                            <p>Build reusable plans for member onboarding and billing consistency.</p>
                        </div>
                    </div>
                    <form id="planForm" class="row g-3">
                        <input type="hidden" id="planId">
                        <div class="col-12">
                            <label for="planName" class="form-label">Plan Name</label>
                            <input type="text" id="planName" class="form-control" placeholder="Monthly Plus" required>
                        </div>
                        <div class="col-md-6">
                            <label for="planDurationValue" class="form-label">Duration Value</label>
                            <input type="number" id="planDurationValue" class="form-control" min="1" value="30" required>
                        </div>
                        <div class="col-md-6">
                            <label for="planDurationUnit" class="form-label">Duration Unit</label>
                            <select id="planDurationUnit" class="form-select" required>
                                <option value="days">Days</option>
                                <option value="months">Months</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="planPrice" class="form-label">Price</label>
                            <input type="number" id="planPrice" class="form-control" min="0" step="0.01" placeholder="Enter plan price" required>
                        </div>
                        <div class="col-12">
                            <label for="planDescription" class="form-label">Description</label>
                            <textarea id="planDescription" class="form-control" rows="4" placeholder="Explain plan access, perks, or restrictions"></textarea>
                        </div>
                        <div class="col-12 d-flex gap-3">
                            <button type="submit" class="btn btn-warning fw-semibold">Save Plan</button>
                            <button type="button" id="planResetBtn" class="btn btn-outline-light">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-xl-7">
                <div class="panel-card">
                    <div class="panel-head">
                        <div>
                            <h3>Membership Plans</h3>
                            <p>Edit, delete, and review plan usage across members.</p>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-theme align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Plan</th>
                                    <th>Duration</th>
                                    <th class="text-end">Price</th>
                                    <th>Description</th>
                                    <th>Members</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="plansTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/plans.js"></script>
    <script src="assets/js/members.js"></script>
    <script src="assets/js/attendance.js"></script>
    <script src="assets/js/payments.js"></script>
    <script src="assets/js/invoices.js"></script>
    <script src="assets/js/reports.js"></script>
    <script src="assets/js/settings.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
