<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Armour Fitness Club</title>
    <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AFC" />
    <link rel="manifest" href="assets/favicon/site.webmanifest" />
     <!-- Basic SEO -->

    <meta name="description"
        content="GymPulse is a smart, offline-first gym management system to manage members, attendance, payments, and invoices. Perfect for gym owners who want a simple and powerful solution.">

    <meta name="keywords"
        content="gym management software, gym management system, fitness club software, gym attendance system, gym billing software, offline gym software, GymPulse">

    <meta name="author" content="Harsh Pandey">

    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="GymPulse – Smart Gym Manager">
    <meta property="og:description"
        content="Manage your gym operations easily with GymPulse. Track members, attendance, payments and invoices in one system.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/img/armour.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="GymPulse – Smart Gym Manager">
    <meta name="twitter:description" content="Offline-first gym management system for smart gym owners.">
    <meta name="twitter:image" content="assets/img/armour.png">
    <script>
        (function () {
            try {
                const raw = localStorage.getItem("gympulse_db");
                const parsed = raw ? JSON.parse(raw) : null;
                const theme = parsed && parsed.settings && parsed.settings.theme ? parsed.settings.theme : "dark";
                document.documentElement.setAttribute("data-theme", theme);
                document.documentElement.setAttribute("data-bs-theme", theme);
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "dark");
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="members" data-title="Members" data-requires-auth="true" class="app-body">
    <div id="page-root">
        <section class="panel-card mb-4">
            <div class="panel-head">
                <div>
                    <h1>Member Directory</h1>
                    <p>Search, filter, and manage the full membership base.</p>
                </div>
                <a href="add-member.html" class="btn btn-warning fw-semibold">Add Member</a>
            </div>
            <div class="row g-3">
                <div class="col-md-6 col-xl-5">
                    <label for="memberSearch" class="form-label">Search Member</label>
                    <input type="search" id="memberSearch" class="form-control" placeholder="Search by name, phone, or plan">
                </div>
                <div class="col-md-3 col-xl-3">
                    <label for="memberStatusFilter" class="form-label">Status</label>
                    <select id="memberStatusFilter" class="form-select">
                        <option value="all">All Status</option>
                        <option value="active">Active</option>
                        <option value="expiring">Expiring Soon</option>
                        <option value="expired">Expired</option>
                    </select>
                </div>
                <div class="col-md-3 col-xl-2">
                    <label for="memberPlanFilter" class="form-label">Plan</label>
                    <select id="memberPlanFilter" class="form-select">
                        <option value="all">All Plans</option>
                    </select>
                </div>
                <div class="col-xl-2 d-flex align-items-end">
                    <div class="metric-tile small-tile w-100">
                        <span>Total Visible</span>
                        <strong id="memberVisibleCount">0</strong>
                    </div>
                </div>
                <div class="col-md-4 col-xl-2">
                    <label for="memberPageSize" class="form-label">Rows Per Page</label>
                    <select id="memberPageSize" class="form-select">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="panel-card">
            <div class="table-responsive">
                <table class="table table-theme align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Phone</th>
                            <th>Plan</th>
                            <th>Join Date</th>
                            <th>Expiry Date</th>
                            <th>Status</th>
                            <th>Notes</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody"></tbody>
                </table>
            </div>
            <div class="table-toolbar mt-4">
                <div class="subtle-text" id="memberPageInfo">Showing 0 of 0 members</div>
                <div class="pagination-controls">
                    <button type="button" id="memberPrevPage" class="btn btn-outline-light btn-sm">Previous</button>
                    <span class="subtle-text" id="memberPageIndicator">Page 1</span>
                    <button type="button" id="memberNextPage" class="btn btn-outline-light btn-sm">Next</button>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/plans.js"></script>
    <script src="assets/js/members.js"></script>
    <script src="assets/js/attendance.js"></script>
    <script src="assets/js/payments.js"></script>
    <script src="assets/js/invoices.js"></script>
    <script src="assets/js/reports.js"></script>
    <script src="assets/js/settings.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
