<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armour Fitness Club - Smart Gym Manager</title>
    <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AFC" />
    <link rel="manifest" href="assets/favicon/site.webmanifest" />
    <script>
        (function () {
            try {
                const raw = localStorage.getItem("gympulse_db");
                const parsed = raw ? JSON.parse(raw) : null;
                const theme = parsed && parsed.settings && parsed.settings.theme ? parsed.settings.theme : "dark";
                document.documentElement.setAttribute("data-theme", theme);
                document.documentElement.setAttribute("data-bs-theme", theme);
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "dark");
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="index" class="route-body">
    <div class="route-screen">
        <div class="brand-mark mb-4">AFC</div>
        <h1 class="route-title">Armour Fitness Club</h1>
        <p class="route-copy">Loading your smart gym management workspace.</p>
        <div class="spinner-border text-warning" role="status" aria-hidden="true"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/plans.js"></script>
    <script src="assets/js/members.js"></script>
    <script src="assets/js/attendance.js"></script>
    <script src="assets/js/payments.js"></script>
    <script src="assets/js/invoices.js"></script>
    <script src="assets/js/reports.js"></script>
    <script src="assets/js/settings.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
