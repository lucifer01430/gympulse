<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Armour Fitness Club</title>
    <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AFC" />
    <link rel="manifest" href="assets/favicon/site.webmanifest" />
    <script>
        (function () {
            try {
                const raw = localStorage.getItem("gympulse_db");
                const parsed = raw ? JSON.parse(raw) : null;
                const theme = parsed && parsed.settings && parsed.settings.theme ? parsed.settings.theme : "dark";
                document.documentElement.setAttribute("data-theme", theme);
                document.documentElement.setAttribute("data-bs-theme", theme);
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "dark");
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="payments" data-title="Payments" data-requires-auth="true" class="app-body">
    <div id="page-root">
        <section class="row g-4">
            <div class="col-xl-5">
                <div class="panel-card h-100">
                    <div class="panel-head">
                        <div>
                            <h1>Record Payment</h1>
                            <p>Capture collections against the selected member's assigned plan.</p>
                        </div>
                    </div>
                    <form id="paymentForm" class="row g-3">
                        <div class="col-12">
                            <label for="paymentMember" class="form-label">Member</label>
                            <select id="paymentMember" class="form-select" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Selected Plan</label>
                            <div class="form-control payment-due-display" id="selectedPaymentPlan">No plan selected</div>
                        </div>
                        <div class="col-md-6">
                            <label for="paymentDate" class="form-label">Payment Date</label>
                            <input type="date" id="paymentDate" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Plan Amount</label>
                            <div class="form-control payment-due-display" id="planAmountPreview">0</div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Already Paid</label>
                            <div class="form-control payment-due-display" id="totalPaidPreview">0</div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Outstanding Due</label>
                            <div class="form-control payment-due-display" id="paymentDuePreview">0</div>
                        </div>
                        <div class="col-md-6">
                            <label for="paymentMethod" class="form-label">Method</label>
                            <select id="paymentMethod" class="form-select" required>
                                <option value="Cash">Cash</option>
                                <option value="UPI">UPI</option>
                                <option value="Card">Card</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="paymentAmount" class="form-label">Amount</label>
                            <input type="number" id="paymentAmount" class="form-control" min="0" step="0.01" required>
                        </div>
                        <div class="col-12">
                            <label for="paymentNotes" class="form-label">Notes</label>
                            <textarea id="paymentNotes" class="form-control" rows="3" placeholder="Add remarks or receipt details"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-warning fw-semibold">Save Payment</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-xl-7">
                <div class="row g-4 mb-4" id="paymentSummary"></div>
                <div class="panel-card">
                    <div class="panel-head">
                        <div>
                            <h3>Payment History</h3>
                            <p>All payment entries with member, plan, paid, and due tracking.</p>
                        </div>
                        <div class="d-flex gap-2">
                            <select id="paymentHistoryMemberFilter" class="form-select">
                                <option value="all">All Members</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-theme align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Member</th>
                                    <th>Plan</th>
                                    <th>Method</th>
                                    <th class="text-end">Amount</th>
                                    <th class="text-end">Total Paid</th>
                                    <th class="text-end">Due Left</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody id="paymentHistoryTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/plans.js"></script>
    <script src="assets/js/members.js"></script>
    <script src="assets/js/attendance.js"></script>
    <script src="assets/js/payments.js"></script>
    <script src="assets/js/invoices.js"></script>
    <script src="assets/js/reports.js"></script>
    <script src="assets/js/settings.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
