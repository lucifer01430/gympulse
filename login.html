<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Armour Fitness Club</title>
    <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AFC" />
    <link rel="manifest" href="assets/favicon/site.webmanifest" />
    <script>
        (function () {
            try {
                const raw = localStorage.getItem("gympulse_db");
                const parsed = raw ? JSON.parse(raw) : null;
                const theme = parsed && parsed.settings && parsed.settings.theme ? parsed.settings.theme : "dark";
                document.documentElement.setAttribute("data-theme", theme);
                document.documentElement.setAttribute("data-bs-theme", theme);
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "dark");
                document.documentElement.setAttribute("data-bs-theme", "dark");
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="login" class="login-body">
    <main class="login-screen">
        <section class="login-card">
          <div class="brand-wrapper text-center">
    
    <div class="brand-mark">
        <img src="assets/img/armour.png" alt="Armour Logo">
    </div>

    <h1 class="gym-name">ARMOUR</h1>
    <p class="gym-subtitle">Fitness Club</p>

</div>
            <h1 id="loginModeTitle" class="login-title mt-3">Armour Fitness Club Access</h1>
            <p id="loginModeCopy" class="login-copy">Sign in to manage members, plans, attendance, and billing.</p>

            <form id="setupForm" class="mt-4 d-none">
                <div id="setupSection">
                    <div class="mb-3">
                        <label for="setupUsername" class="form-label">Admin Username</label>
                        <input type="text" id="setupUsername" class="form-control form-control-lg" placeholder="Create admin username" required>
                    </div>
                    <div class="mb-3">
                        <label for="setupPassword" class="form-label">Password</label>
                        <input type="password" id="setupPassword" class="form-control form-control-lg" placeholder="Create secure password" required>
                    </div>
                    <div class="mb-3">
                        <label for="setupConfirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" id="setupConfirmPassword" class="form-control form-control-lg" placeholder="Confirm password" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 btn-lg fw-semibold">Create Admin Account</button>
                </div>
            </form>

            <div id="credentialSection" class="mt-4 d-none">
                <form id="credentialForm">
                    <div class="mb-3">
                        <label for="loginUsername" class="form-label">Username</label>
                        <input type="text" id="loginUsername" class="form-control form-control-lg" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Password</label>
                        <input type="password" id="loginPassword" class="form-control form-control-lg" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 btn-lg fw-semibold">Login to Dashboard</button>
                </form>
            </div>

            <div id="pinSection" class="mt-4 d-none">
                <div class="section-divider"><span>Quick PIN Login</span></div>
                <form id="pinForm">
                    <div class="mb-3">
                        <label for="quickPin" class="form-label">4-digit Quick PIN</label>
                        <input type="password" id="quickPin" class="form-control form-control-lg" maxlength="4" inputmode="numeric" placeholder="Enter quick PIN">
                    </div>
                    <button type="submit" class="btn btn-outline-warning w-100 btn-lg fw-semibold">Use Quick PIN</button>
                </form>
            </div>

            <div class="login-hint mt-4">
                <p class="mb-1">First launch requires admin account setup.</p>
                <small>Quick PIN can be configured later in Settings.</small>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/plans.js"></script>
    <script src="assets/js/members.js"></script>
    <script src="assets/js/attendance.js"></script>
    <script src="assets/js/payments.js"></script>
    <script src="assets/js/invoices.js"></script>
    <script src="assets/js/reports.js"></script>
    <script src="assets/js/settings.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
